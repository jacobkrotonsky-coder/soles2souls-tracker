<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soles2Souls Donation Counter</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .counter-box {
      background: white;
      border-radius: 16px;
      padding: 48px 64px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .label { font-size: 1.1rem; color: #666; margin-bottom: 8px; }
    .count { font-size: 6rem; font-weight: 700; color: #2a7ae4; line-height: 1; }
    .sublabel { font-size: 1rem; color: #999; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="counter-box">
    <div class="label">Shoes donated so far</div>
    <div class="count" id="count">—</div>
    <div class="sublabel">and counting</div>
  </div>
  <script>
    async function refresh() {
      try {
        const res = await fetch('/api/counter');
        const { total } = await res.json();
        document.getElementById('count').textContent = total.toLocaleString();
      } catch {}
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
